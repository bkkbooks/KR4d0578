body:
  text: 來鶴亭集卷二元吕誠撰洪武辛亥南歸重渡梅關二首去年竄逐下南溟萬里歸來鬢已星望入西川天一髮香爐長繞九江青其二歸路籃輿鶴背青保昌東下過長亭今朝又向梅關度此是江南第一程舟中望廬山廬山昔在圖中見落星渚前今始逢雲嶺半藏紅葉寺霜風遙遞翠微鐘龍君或居彭蠡澤仙人愛住香爐峯雙鳬之舄倘可借飛入前頭聽玉琮太湖晚泊震澤三萬六千頃日月出沒波濤中氷壺寒浸林屋洞青壁下嵌馮夷宫霜林人家橘子熟晚飯䑨樓菰米紅羽仙黃鶴時相過知是銀河一竅通秋江待渡圖漁罾落照幾家村過鴈行行八字分船擱岸沙潮正落白衣喚渡隔秋雲月下獨酌聞桂香今宵風月儘清酣碧海寒光百丈涵天上散花香第一尊前舞袖影成三方諸玉露清於醥崖蜜金橙小勝柑老興此時原不淺高歌猶憶望江南送人之潮兼柬鄉友瘴雨蠻風晚更寒揭陽山色滿征鞍臨行漫寫相思句好與東吳故舊看題山水圖平湖竹樹雨雲間憶得漁樵共往還草閣歸來三十載至今吟夢繞西山星夕八極無塵海宇高眼空百里絶秋毫銀潢遙渡神官鵲玉食誰需曼倩桃其二天孫儷偶當今夕河鼓光芒耀兩旗愧我未能驅大拙可憐瓜果綴蛛絲醉鄉詩梨花春滿碧雲洲自是東皋舊所遊醇俗從來稱緑醑土風大抵是青州五經時向雙莖㵼三雅何妨大白浮起舞却嫌天地窄崇臺更擬築糟丘七月望夜得樓字東池月滿重開席不减當年庾亮樓每謂人生須縱飲固知物色總難留螢光過㡢還星散雲氣行天似水流髙興無窮秋滿眼山隂何處有行舟菩提葉燈寶林萎葉墜天風一落人間便不同雲鏡熒煌開月匣并刀裁剪費春工星攢蜩翼氷綃薄華擁蝦鬚玉栅紅從此可傳無盡焰五湖今有水晶宫題墨梅圖羅浮仙子佩珊珊水月精神尺楮間起我江南無限意夢騎白鶴下孤山其二凌霄峰頂雪初乾暖逼繁枝玉作團三尺溪藤散香影絳紗籠燭夜深看題山水圖十年不踏天台路千里西風憶舊遊欲向溪頭覽陳迹白雲飛盡萬山秋題牧牛圖十里平原不礙山落花春草錦斑斑太平田裏歸來日誰識劉家黑牡丹秋江晚霽圖長天斂盡落霞紅草屋炊烟野渡東一帶寒沙秋水白荻花吹老鯉魚風南歸遣懷海南每憶越王樓可奈鄉關萬事愁對客花前椰子酒看山馬上木綿裘羈縻此日生還喜准擬歸耕老去休愧我無家憐晚歲卜鄰終在瀼西頭安慶市樓突兀凌波起樓上女兒未梳洗短篷初泊酒家門新釀玉壺香十里買魚沽酒桂蒲帆九月淮村風日美回頭遙望大龍山翠屏滅沒寒烟紫歸來縱步歸來海上城荆榛滿路不堪行問人倐忽更貧富訪友凄凉半死生烏寶無神悲積帑青松有泪對空塋逆流一片門前水猶對青山落日明南歸海上訪友北風吹雁渡江烟訪舊東吳晚泊船野水似龍爭入海大星如月獨當天羌村夢寐青燈下蜀道間關白髮年兵革漂流無倚著眇豫何處賦歸田秋日南歸舊隱秋日舊廬成獨坐蕭蕭落木對晴暉草深道狹行人少地老天荒舊俗非湖海十年情盡改關河千里夢初歸柴門流水依然在酒熟無勞望白衣暮春感懷春雨屋上鳴流泉竹間㵼清晨望原隰新緑或可藉維時夏春交節序驚代謝悠悠念陳迹默默觀蠧化人生夫如何胡不稅塵駕露坐虛庭坐凉夕宵永覺衣薄犬吠古塔鈴烏啼野城柝感舊心孔哀懷人興殊惡仰視斗杓傾西林月初落行春曲送人之杭便道省姊清明一百六桃杏漫山谷送子武林行草漲吳江緑吳江桞絲千萬條青青逺映垂虹橋扁舟不用蒲十幅短歌蕩漾隨輕撓東風夜泊官河渚明日升堂拜家姊言長缺歲㑹面難既覯云胡不欣喜人生㑹合良可憐感極無言淚如洗子今勿謂行路難有酒宜飲飯加餐流光去人若流水富貴於我一鼠肝西湖三月花飛殘六橋烟雨空濛間老夫不到四十載至今夢繞南屏山湖山應怪别來久此行歷覽亦希有歸來寫作行春圖為爾題詩三百首送錢道士遊武當武當諸峰何壯哉大朵小朵青蓮開𤣥聖髙居天地户赤日下照金銀臺神龜六眼電光走山鬼一足雲頭來道人再拜望北極應帶滿身星斗回寄廉夫楊子十年官不調如此末州下吏何洞庭鐵笛龍吹得天上瓊書鶴寄多車子看花將一輛雪兒行酒豔雙歌時時對客教絃索繡領單衫月色羅閏月二十四日陪館士秦文仲陸良貴奉省臣命祭崑山東齊龍洲劉先生墓黃鶴磯頭風雨秋中原一望使人愁羣臣誰决和戎議九廟猶銜誤國羞慷慨魯連寧蹈海凄凉王粲更登樓荒岡四尺先生墓再拜酹之雙玉舟來鶴亭集卷二
