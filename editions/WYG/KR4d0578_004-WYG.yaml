  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0578_WYG_004-1a, image: WYG1220/WYG1220-0589a.png}
body:
  text: 來鶴亭集巻四元吕誠撰雙清詩梅花水仙一草木也其生恒在水涯幽谷之間發於草木揺落之後不以榮悴生死異其芳不以春秋寒暑易其操雖窮冬盛雪猶介然與松竹爭竒並茂有類乎髙人逸士懐抱道德遯世絶俗而髙風雅志自有不可及者余雖不敏心甚慕惜之故賦此以識云怪得荒寒野水濵疎花冷蘂看横陳歌飜玉樹多嫌俗夢喚梨雲却欠真半㸃不煩春刻畫一分尤仗雪精神蠟團新蕚雖同出未免韓公議小醇其二湘魂懶上木蘭舟淪落江南草莽丘淡色幽香羞自獻江空歳曉若為儔素羅㣲步盈盈月翠袖寒分寸寸秋隔竹聞缺靈瑟語呉雲楚雨不勝愁覔菊花已過西風九日秋蒼筤池上若為遊似聞嘉菊黄於鵠乞我雙栽照白頭其二洲上黄花滿意開倩人更為覔竒栽小桃源裡秋如海分取清香一半來竹枝歌六首寄胡安定上思下思十萬山左江右江如月灣江邊神女長留珮天上仙人早賜環其二銅柱山前銅鼓聲野花蠻果不知名却喜土人能愛客蔞葉㯽榔相送迎其三雲開沙凈水迴迴越鳥啼邊朱槿開峒裡蠻丁不畏瘴朝朝衝霧趂虛來其四客棹愁行湘波水憑郎莫唱竹枝歌好山好水春更好不見聞人載酒過其五春雲如墨瘴烟中鸚鵡羣飛荔子紅男兒守家婦當戍粤俗古來成土風其六青草湖頭春日暉苧羅山上白雲飛行人莫聴鷓鴣怨陌上花開緩緩歸采蓮曲采蓮落日下雙舟白縠風輕易覺秋淺淺溪流齊鶴膝青青荷葉過人頭楊桞詞一樹千千萬萬枝枝枝到地弱於絲繰風織雨難成疋緯恨經愁無斷時題翠濤軒為則明作梧竹幽深處士居八磚日轉午隂移到門不敢題凢鳥自篆龍香冩好詩其二翠葆如雲過屋髙金風為我掃炎熇五更萬壑秋聲滿疑是仙家駕海潮其三七尺烏藤手自操鯉魚風起月輪髙帶將一箇城南樹五賈岡頭看翠濤焚香六時焚栢子一飯即踟趺陋彼黄金鼎欣余白瓦爐下簾風不起掩巻日將晡擾擾塵中客清閒愧老夫煮茶暫徹貝書窗下讀旋烹松鼎雨前茶未研顧渚金沙餅謾試洪都露井芽陸子煮經非所貴党家風味不余誇何當滿貯中􅍽水滌我胸中寸縷瑕濁醪野人炊新秫醖釀為濁酒槽頭一甕雲玉色渾渾厚乗間運杯勺斟酌任升斗鯨吸助詩狂豕飲欲乾嘔仰天大白浮月光流入口摘菌菌子白于雲羅生枯楊枝地氣蒸土膏儼如三秀芝鮮摘色瑩潤薄美香敷腴飲食貴適口豈謂物細㣲蘆菔蘆菔出深土内含霜雪清冷然消暑暍快矣解朝酲脆白渾勝藕頑青亦可羮鎮州禪悦味從此得佳名粹餅玉塵團小餅蔗汁灌中邊素可羞賔席齋宜供法筵虛心雲片落登豆雪球圓咀嚼吾無間惟欣老齒便煨蕷短褐西風裏長鑱斸土芝馨香侔粔籹黯色類蹲鴟玉糝從來貴金虀或未竒夜闌深撥火惟有懶殘知謝惠則明秋菱次韻筠籠遥致百氷丸入口先驚熨齒寒柔指不辭連蒂摘弱肌終免抱枝乾甘芳粹矣斯為美頭角嶄然未可干應為文園消渇甚好懐時復寄詩壇謝惠菜江鄉正月尾菜苕味勝肉莖同牛乳腴葉暎翠釵緑毎辱隣家贈頗慰老夫腹囊中留百錢一日買一束謝惠新笋山人劚得錦綳兒逺寄吾家香積厨入饌便須參一味登盤還許配雙壺修莖比蔗原無滓瘦節如笻未可扶已有此君休煮簀東林春雨正堪需洪武二十年春二月十八日過麋州道中江霧全收曙色開晴沙白白水洄洄笋輿憶得當年路看盡梅花看竹來過麋州書舍寄葛青城重來問訊東橋竹竹裏鉏雲結草堂隔㟁淮山當鴈汊半陂春水䕶麋場交游契濶頻搔首今古興亡一斷腸田野不妨聊卒歳宦途何處是康莊三月二十日過桐廬陸氏故居感而有賦昔年曽醉陸家池句首從來有所思野哭隣歌如昨日陵遷谷變異當時喧林衆鳥偷櫻子卧石羣羊没兔葵莫説華亭千古事故宫禾黍正離離題青溪仙洞圖曽謁青溪古洞天稚松看種石橋邊一條歸路朱絃直不到家來五百年夏日偶書寄友人竹雞呼夢出華胥佔畢終朝可療饑隱几雲山無百里出門衢路有千岐桃笙麈尾風清暑槐渡鷗波雨散絲尚憶故人憐我老可無新句慰相思題吹笙仙女二圖森森羽節導雲軿鸞背㣲聞縹緲笙小隊霓裳多似雨衆中誰是董雙成其二鰲背三峯水殿虛天香吹滿六銖衣青禽忽報麻姑信獨自吹笙月下歸五月廿日雨懐有寄竹洲草樹暗漁莊五月雨多沙水黄薝蔔林深書院小芭蕉葉大酒尊凉乍瞻霽色收屏翳猶訝車聲走阿香井丹征途塵没馬懐人幽興詎能忘六月六月赤日困溽蒸一雨洗天如醉醒堆案倦飜遮眼偈垂簾誰究洗心經术花徧地牽雲白竹色當簷落酒青欲學成都百錢卜榰床龜殻未能靈題此筠室即予讀書之舍白首何縁植此筠篔簹洲上語平生前身謾説成龍去老節猶堪作鳯鳴玉版老禪時膾炙錦綳稚子且逢迎氷霜惜取根株在合與梅花訂此盟西郊老農歌豈不聞昔人大積郿塢貲烈炷竟然東市臍又不聞醉鞭戱擊珊瑚枝禍機一發當咎誰東門牽犬事已昨華亭唳鶴良可吁不如西郊老農夫公田數畆宅一區桑麻環繞水竹居墻隂祝祝五母雞東風駘蕩吹漣漪欣欣農事方自兹江鄉春雨已知時緑蓑驅牛扶一犁負囊提榼兩小兒服勞執役不吾欺二麥枯時謝豹啼秧鍼出水青欲齊少女猶鳴燈下機老妻澼絖頭不梳桑無附枝麥兩岐官清不賣二月絲流光去人候如馳轉眼秋田黍離離步擔牛載官倉輸官租己了一事無隣家酒熟相嬉娯醉後耳熱歌嗚嗚人生定分亦何需富貴與我浮雲如呌囂掃跡鼠穴虛四海八荒歌雍熈太平何幸親見之嗚呼西郊老農之樂樂有餘鹿門老龎真汝師答蒼筤室圖蒼筤之室海西洲挾以蒼髯秃尾虬徂谷諸賢圖上見渭川千畆夢中遊風生枕簟清無暑冷逼衣巾翠欲流我亦因之來少憩恐煩玉版致盤羞寄楊克齋并求桂屑釀酒擬向蓬萊一問津只愁清淺久揚塵醉鄉重到情依舊素壁留題字已泯雪夜放舟懐賀老秋雲把釣夢𤣥真西風滿地黄金粟好釀儂家石凍春偶成寄友瑶溪溪水上先世闢林廬漫有江湖思再從木石居樹桐留宿鳯養竹持竿魚有子供甘脆衰年豈負予其二壤隔南塘路門依野次成初非慵應接自是寡將迎笋蕨搜山得鹽醯入市營閒居薄滋味盤膾敢求精來鶴亭集巻四
