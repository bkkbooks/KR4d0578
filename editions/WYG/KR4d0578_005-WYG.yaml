body:
  text: 來鶴亭集巻五明吕誠撰寓言苦瓠若懸癭宜瓢亦宜笙笙將用含雅瓢以供酌烹吾為苦瓠謀任力不任聲薦勞鉶鼎間自足資養生物賤終反貴吹萬豈其情其二少學老無成所守但糟粕譬如福與市涉海求靈藥豈不望三山風至輙引却歳䦨坐窮陋青燈暎疎箔雖㣲白足禪自置丹霞博賤貧吾所安飲水差足樂隣家日椎牛不似西隣禴午日有感午日南風裏千山積雨邊白頭難諱老青眼尚誰憐酒向清齋止杯從舊俗傳陶潜歸計是但覺費詩篇其二綵衣娯鶴鬢錦字照行囊忽忽經年夢凄凄午日觴西州青瘴合東海白雲長便作鸞凰去何妨萬仭翔秋日雨後三首荒村積雨長蒿萊裘葛駸駸嵗月催霜霧不無祥練感絲桐一鼓有餘哀其二浦口寒潮頻有信空中鳥跡了無痕野航落日東西渡黄葉秋風逺近村其三曲碕茅屋兩三家返照垂虹隔斷霞風外葉聲來似雨莫嗔楊桞不藏鴉次韵寄澄江白龍寺采師白龍山色翠離離為愛青山返照遲野渡閒雲隨杖錫海風吹雨潤伽黎斷常政儗通三學理事何妨付八支千古澄江凈如練令人空憶謝公詩求亮講師鈎勒畫竹亮號雨篷少時文采貫晴虹老去能侔造化功怪石幽篁開颯爽尺綃寸楮破鴻濛喜聞舊隱歸雲錫儗上慈航聴雨篷要見此君真面目為煩鈎鐵掃清風星夕露坐二首次禪客韵海城鐘皷夜沈沈秋入天潢露滿襟弦月無聲聞玉杵采星何處度金針桃笙石枕悠揚夢桞􅘪莎雞自在吟諸相已空泡幻影百年何有去來今其二一方明月欵禪扉𤓰果寒氷亦可須虚幌疎星流熠燿大江凉露浸芙蕖空華根蒂難尋摘夢境塵囂費剗除亹亹笑談無剰語仰看星斗夜何如神舟曲時運艘以小舟製成龍形鐃歌鼓吹往來江潮中以答神貺云扶桑日出碧海底聖化東漸千萬里林林樓櫓日邊來雲帆影壓三江雨年年五月凌大洋圖南九萬斯褰舉相風之烏畢逋尾餉道飛供太倉米太倉城下水連空水仙祠前神戾止靈旗婀娜送祥颷五色蜿蜒浪中起摐金伐鼓萬夫謳潮落潮生海門裏謌唱龍頭棹龍尾三日南風過黒水西菴觀洗竹洗竹移風榻鈎簾對雪峯唪餘天竺偈夢熟海門鐘耳厭咸陽犬神交劍浦龍松房人不到應有白雲封星夕蟲鳴草逕露華凝畏暑空庭睡未能矮屋紙窗風雨破飛蛾亂撲佛龕燈秋夜二首瀼瀼露氣下中天摵摵秋聲滿樹顛無得桂香無鼻孔道人一夜不成眠其二砌草蟲吟四壁靜簷竹揺燈動秋影老來無夢到陽臺開門月在青松頂題畫鴈霜滿蒹葭水國秋殘汀賸渚故相投江湖兄弟飄零盡白首披圖無限愁星夕友人見訪翩翩飛佩逐歸霞絶勝衝寒訪若耶貪看雙星㑹河皷蹇驢䭾醉入西家題杜少陵行春圖徒步歸來白髮新蹇驢䭾醉過殘春問渠何處花饒笑韋曲家家正惱人其二牢落出同谷凄凉賦七歌日斜驢背上白髮似詩多山居夜坐有懐海濵翁投老歸來未得休半生江海寄浮漚禪房風雪蒲團夜閒看燈花結客愁其二海濵老人喜讀書十年不出鬢成絲靈椿堦下森森長却勝東家桃李枝其三書屋沈沈劍氣寒白頭無語問更䦨向來喜作尊前舞今日尊前欲舞難寄江南紹隆伯瑩一冬風雪出村稀忽見梅花暎酒旗行過江橋迥回首無人寄與紹隆師題趙仲穆畫遊騎挾彈圖白馬王孫紅錦韉平明按轡百花前金丸迸入他人宅却把蒼頭打玉鞭正月廿三日借竹洲訪顧藏六于司馬廟一畨行春始出村韶華無賴已平分野鳥亂啼司馬廟石麟猶卧汲家墳燒痕新緑渾禁雨栁色半黄都染雲蕩涇橋頭有酒賣醉把梨花日又曛絶句題水仙圖秋水為神玉為骨山礬是弟梅是兄恍然坐我水仙府吾與汝曹俱眼明春晚苦寒晚閣春寒户半扄東風窗外雪冥冥破除客况非耽酒却怕寒衾半夜醒三月廿七日久雨寄葛青城隣家有竹亦不惡空翠碧鮮連户庭十日風雨水泉暴百里海門雲霧溟紫藤花老修竹觀黄栗留啼芍藥㕔青城山人近相見話别橋南酒半醒喜晴槐龍倒影散㣲凉宜男多花開北堂舊日江山慚謝屐於今歳月付奚囊郭㕙已喜無三窟元緒從來有六藏曉起天光入書室曈曈紅日上扶桑客至幽窗談笑話平生舊研磨穿筆代耕白髮滿頭難諱老青山排闥故多情桃花灼灼渾無語春雨瀟瀟尚未晴明日蘭舟休便發南隣笋蕨已堪烹暑夕畏熱起獨坐風扉聊一開流螢㸃波去睡犬覺人來缺月半輪上殘潮午夜迴飜思河朔㑹未用上吾杯絶句一首問葛青城疾椿樹生凉午簟餘桐花隂轉竹窗虚毗耶示疾原非病四百都將智刄除七言古詩一首贈醫崑之婁西良醫曰缺之業累世矣人有疾痛必走先生治無不愈也余缺間以衰劣資其藥餌之功焉先生赴人之急也不憚跋踄之勞人之求藥也自無有貴賤之别其執藝之精而負嘉名也不虚矣姑誦所聞謾為古詩二十韵匪以為報焉先生字缺自號武陵武陵先生有竒骨何年得此活人術昔聞夢入閬風巔醉蹋青天霞五色仙人手掉芙蓉旗對面青囊笑相擲囊中白日生光景雲篆飄飄皆鳥迹應知此物神所祕區區秦火奚能厄斡旋氣運保太和下拯黔黎乃其職酒酣渇飲上池流半生不平俱蕩滌歸來髙卧玉山左姓名頗為時人識白雲雞犬日相聞市壺那與塵世隔碧桃紅杏自成蹊赤箭青芝翠如織蟁蛭不損一念仁隂功早已標仙籍嗟余足迹半九州因癡有愛雪滿頭扶衰毎獲金石劑是身是病日以瘳木李愧無瓊玖報玉環自乏巾箱酬先生髙致人所慕守價不二儗伯休宋清逺德今復見作傳恨無栁桞州秋日漫興塘西老人竹洲居不到塘西兩月餘黄菊已花急釀酒青山可數聊停車牛羊下來日夕後鴻雁大至霜雨初秋光去人遽如許底事交游㑹面疎九日前雨中已知無地可登臨况是孤村風雨深酒為解憂唯有醉菊憐短髮不勝簮白魚出網一雙玉黄橙擣虀三寸金南北暌離佳節過壯遊空感昔年心題秋浦歸舟圖碕􅜌楓林過野橋梵王宫殿在山腰扁舟好趂樵風去莫待寒江落晚潮其二秋浦行舟日欲晡秋來到處有蓴鱸酒家鱠具如堪借暫卸西風十幅蒲題漁樵圖霜滿頭顱雪滿鬚相逢且莫羡髙車吾家有酒今朝熟帶葉青柴好煮魚枕銘匪木斯礱匪石斯刻囊括混沌首据是職閑邪存誠進修爾思夙興夜寐爾其儆之題壁青天半夜飛霹靂忽見雙龍起墨池拾得織女支機石歸來冩作無聲詩來鶴亭集巻五
