body:
  text: 來鶴亭集卷七明吕誠撰訪耦成蒼筤軒時武孟制滿求仕地有桃源徑蒨草溪東十里餘小桃源上見郊居落紅石徑和雲掃新緑瓜畦趂雨鉏池上此君宜對酒門前長者屢回車此中尚未商山老見説王褒有薦書江雨軒為耦武孟作春雨如暗塵江鄉晝冥冥幽人感時變於兹事耕耘江雨亦屢作江風穆而清土膏潤如酥草木努甲生此境誰為之曰維天之成我藝我稷黍我軒泊我宇晨興帶經鉏寧恤作勞苦嘉苗既芃芃田畯為之喜霜飈一披拂致此歲功美斗酒以自勞共入此室處矧兹值時康樂哉咏江雨挽胡浩然卒於馴象之橫州憶陪賔席接談鋒草載論交一旦空東海人人懷伯始佳城鬱鬱閉滕公死生契濶飛鴻外今古興亡斷簡中白首與君成永訣忍將衰涕灑西風巨浸詩書異變也今兹二遭矣洪武庚午秋七月初吉海風自東北來拔木揚沙雖犀兵萬隊不足為雄倒海排山堆阜髙陵皆為漂沒豈沈竈産蛙之足語哉猶記洪武戊午歲秋七月四日亦嘗罹此蓋大魚入城之兆也今兹震蕩勢復過之側聞三洲一千七百家皆葬魚腹豈非囿於數者耶嗚呼命豈有常乎可不慎歟可不畏歟庚午七月之初吉斷虹挾雲蔽西日石尤聲撼天為昏颶母驅車走沙石鯨跳鯤擲地軸翻陽爍隂凝神鬼泣銀濤駕空山嶽摧轉眼奔流浸扉壁三江瀰漫滅無口孤城漭漭天一碧衰年疲􅚿動兢畏變白齋心戒夕愓憶昔前年大魚入三洲漂蕩海水立近者側聞復罹此海灣流尸頭濈濈􅜌塌沙沈絶往來塍斷瀼深苗不實嗚呼上天震怒豈無由誰其尸之誰復詰覔鞠余向寓竹洲洲上種菊百餘栽繞屋盈圃過者因為菊田今年歸草堂似聞秋風駕潮掃蕩無遺擬與吾友求數株聊應重陽故事何如秋潮橫挾雨風顛洲上空聞有菊田香色於人既無有物情在我敢求全頗憐塵世光隂迅似覺人間雨露偏白髮滿頭難諱老蒼顔衰客強為妍豈唯酒向鄰家得自是杯從舊俗傳陶宰不妨多種秫杜陵且莫嘆無錢青天鴈影西風外紅樹秋聲落照邊見説南莊饒物色少分清艷到樽前重陽日有感寄子英袁先生時庚午歲也忽驚時序匆匆改頗覺飈霜稍稍侵莫説賜萸成往事但知餐菊是初心風髙木葉林煙薄雨過野塘秋水深我於古人應有約只慚佳節負登臨訪友洪武庚午九月草七日訪鈕聲逺於太倉城之正陽門造其室曰洞雲四簷竹樹盆山清氣可掬因賦此詩并求其畫山圖云先生家住正陽門繞屋松聲日夜聞大藥總消頭上雪小山長帶洞中雲已知濟物宜終慶况是清時屬右文却嘆吾詩與君畫海門風月擬平分暮冬送友人入杭湖上蚤梅春可掬江頭艓子晚初登從容話别唯樽酒潦倒論懷愧友朋平野雲開山見雪太湖潮落􅜌留氷芒鞋竹杖孤山路白首重遊恨未能東溟生詩為顧某賦東溟之生何所聞抱藝學古以事親翛然一室東海村市塵不到絶垢氛坐見三洲渺無垠一碧萬里玻璃盆雪濤銀屋相吐吞燦爛浴出扶桑暾是時幽人侍宴溫菽水之樂樂天真興來揮掃水墨塵下筆慘淡愁鬼神居然耕鑿生意存經營態度回陽春百年縑素琴斷紋撏褾裝潢稱絶倫由其天機出清新能事逸發皆可人素昧平生笑語頻一日索詩來扣門嗟余耳聵目力昏那能復作寒螿呻霜風搜林葉繽紛寒菊艷艷東籬根姑置是事且勿論與子倒盡花前樽荆溪棹歌是冬鑿脂山經行於此荆溪溪上晚山稠沙棠港口木蘭舟裹頭女子唱歌去水色山光總是愁其二大男鑿山衣盡紅中男操舟慣張篷獨山門外北風惡白浪如天怖殺儂其三溪上雪消春水髙鵝黃新桞暗長橋橋頭人家好春酒無情長與駐蘭橈其四雙舟來往愁奈何日日溪中聽棹歌溪水西流流不斷海門東去作風波竹枝詞五首夫役鑿脂山石臼湖頭泥水深北風吹折壯夫心别家三月絶音問一紙書來抵萬金其二臘月欲盡正月來桞條弄色早梅開年華却似東流水又見青天塞雁回其三千夫萬夫蟻作堆什什伍伍魚貫腮常興埠頭候糧去紅蘭街裏買薪來其四胭脂山頭雨雪飛胭脂山前人苦飢山下斧斤夜逹旦山上間雲常自歸其五十八里岡雲有無炎風掃地雪糢糊山川通塞奚能問間看清波入太湖緑淨軒為茜上郁敏仲作緑淨軒開秋水灣碧鮮如錦畫圖間葛洪井在丹光合雲母屏深翠雨寒崎上琅玕千個立此中天地一壺寬合江曽憶韓公賦醉墨須寫石闌干題牧羊圖牧羝絶域卧穹廬草載空傳雁足書屬國歸時總頭白壯心杖節鬢毛疏題蘭竹圖此君風致絶孤超秋佩紉香怨楚騷頗訝江梅專物論不令渠得配三髙棘雀圖素頸烏頭浪得名區區粉墨寫幽情懸知未省圖南志荆棘叢中過此生寄懷茜川基古雲寮新構竹森森蒨草溪頭春水深白酒過於東老釅清詩聊共已公吟松花别甑炊金粉筍箭當階長玉簮底事莫年頻有約秪緣香火似東林其二身間無事且婆娑轉眼流年一擲梭牢落詩懷三月過顛狂花信五更多潮來海市魚論斗桞暗江林鳥哢歌頗訝寥寥無信使題詩為問近如何洪武壬申十二月聞葛青城殁於遼之貶所有感而賦半生詩酒共登臨醉後長聞擁鼻吟抱朴未忘句漏志管寧終負度遼心星垂北極知天逺夢入東吳似海深逹士已無身後念臨風還為一霑襟寄謝諶西堂惠紙間居歲月暗消磨珍重髙人寄素波子墨客卿當諦受老人真欲寫伽陀其二雲繭羅紋幸見投烏皮几上雪凝眸懷人端為雙魚信作賦空慚五鳯樓其三江草淒迷路不分西林只隔半溪雲處時不負平生學慰我長懷别後文其四沙路雨多生蘚花赤闌橋下酒旗斜望中蘭若依稀似擬隔松雲問煮茶其五翠峯西下連吳會雪浪東來入海門胸次不留元字腳金香爐下鐵昆侖感興靜室無塵少客過新篁隂曵小坡陀朝來始悟春歸盡風裏楊花似雨多其二窗前幽鳥百般鳴猶有餘花照眼明偶爾相遭聊適意固知花鳥亦無情其三午簾煙燼瓦爐香謾讀殘經付一牀底事是非猶入夢固知餘習未全忘其四落花寂寂掩柴荆滿地緑隂新笋生自是老來遊興減江山何處不堪行其五日日鐃歌響露橈麥秋天氣晚瀟瀟鮭蔬頗為年荒備自向東畦種瓠苗八月十七日訪崇恩淨公不遇回途賦仲秋之月日踰七徒步往訪彌天釋繼時秋暘尚鬱陶汗雨淋漓面如炙梅子渡頭沙擱舟黃蘆灘上泥沒膝人生只惜會合稀跋涉終憐老無力村村鵓鳩似呼雨樹樹秋蟬喧午寂禪扉未啓白雲封一錫行空了無迹東齋西廡具梨茗香飯竟飽毗耶室出門搔首大江橫白鳥飛來破秋色題漁翁圖浮玉山前飛白鷺桃花流水泛家船呼兒去换城中酒新得揸頭縮項鯿來鶴亭集卷七
