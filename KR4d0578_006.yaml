body:
  text: 來鶴亭集卷六明吕誠撰寄懷鄉友浩然戍橫州分袂每憐秋未半開帆猶記月初圓客程千里又千里老鬢一年衰一年令弟喜霑新雨露故鄉不改舊山川懸知獻捷歸來日重理琵琶第四絃寄鄉友福州别駕烏石山前聽訟稀石榴洞口看雲飛馬蹄好踏官街月人在青榕影裏歸其二釀來南酒甜於蜜愛浴山泉熱勝湯退食自公微醉後小姬和葉進檳榔春雪逐勢婆娑散杳冥欺春禁桞故崩騰未誇謝女隨風絮且作孫郎映册燈簷溜已呈魚腹劍庭綃誰剪鶴紋綾老來詩思渾荒澀擬賦梁園愧未能題陶靖節晉代髙風信少雙祿田釀酒漫盈缸攢眉走入東林社惠逺愛之如法幢題韓文公藍關雪騎圖逐客何緣路八千孤忠直叩九重天風凌雪滿藍關道却勝當年孟浩然己巳元日偶書東風又轉玉衡杓北望黃雲擁赤霄鶴髮求霑三事祿鳯儀今聽九成韶側聞邊雪沒草地喜見降王欵聖朝王化無為天覆幬謳歌率土頌神堯和韻酬仲莊自笑離羣久索居暫時抵掌即歡虞準繩吾道俱咸若彀率斯文已躍如稚子斑斑青玉瘦酪奴瀲瀲碧雲腴寶坊會有重遊日竹杖芒鞋一訪豫和烹籜龍詩韻雷公使令風火急鞭走雨工頭戢戢泥蟠骨脫未能飛野人爭奮長鑱入寧須逆鱗不復畏斯須唯聞釡中泣金杯苦酒五色光玉版雲腴乳花濕長房見之發長歎麴生一笑恣鯨吸靈物變化不可常駢玉森森佳人立四月草四日雨中寄仲莊四月江鄉暑尚微林寒老客未更衣復愁刈麥雨不止况是索租人正飢榖秧出水青青短筀笋登盤個個肥門外泥深無轍迹相從莫怪出村稀四月晦夜大雷雨日月相鬬鶉火中冥冥一色雲埋空黑風簸搖海波沸排山倒嶽何其雄急電穿窗紫光掣雨腳如麻未斷絶風雷半夜龍子歸霹靂一聲山石裂衣冠危坐謹天威小人破膽始捫舌須臾雲斂稍霽威星光慘淡半明滅於乎上天號令豈輕出摧殘長養不虛設題寒山訪隱便面散策衝寒踏凍沙雪晴山色遍天涯奚奴為我囊詩去黃鶴磯頭問酒家相逢行寄仲莊王缺二十二韻兼柬崇恩徹希二聞士時仲莊教書麋川南山有石白齒齒短衣髙歌中夜起衰年無復夢周公訪舊凄涼半為鬼平生憂患勿復道三年兀坐竹洲裏竹洲隱者更愛客一笑相逢感知已烏几朝朝貝葉書銅瓶夜夜花根水清狂幸不廢吟哦自嚼宫商含羽徴潦倒甘為人所嗤肉食者謀那及此緑瑶故人别我久一見胡為不欣喜我居洲北子港南煙樹相望才一里書堂匼匝數十弓絳帳蕭條二三子棄瓢無緑酒再沽朝盤有罾魚可煮醉來掩卷自吾伊詩筒日夕相填委暇日過我此筠室逢迎聊復具雞黍春酤白白漲密雲夜韭青青剪新雨五月未稼石田秧掉臂軒軒若霞舉人生會合苦不常興盡歸來那復止季鷹豈是為鱸魚宣聖猶然嘆雌雉婁西近畨忽相見停午茶甌細覼縷舊席久荒北海尊新寺花開爛如綺忘情况有八十翁談玄一洗箕山耳為渠痛飲為渠醉自古濁醪有妙理和韻酬沈叔祥白鶴又從遼海歸山川良是昔人非郊居作賦誰能繼勾漏成丹世已稀靈浪潤咽消宿酒飛花如粟點秋衣荒洲䣊肯同迂轍掃地焚香候竹扉次韻答耦武孟猶憶當年應鵠頭詩名從此逹南洲狂歌賴有千鍾酒豪士今無百尺樓紫蟹白魚江市晚緑蕪紅樹海門秋西風開到籬根菊擬向桃源一繫舟寄則明近過余草堂以所作詩見示披誦再四詞極清麗非餘子可儕也欲留少憩過午以母命有他適力辭去之賦此以謝之子南港來扣門日卓午手持數篇詩笑揖首屢俯且致寒暄問披吟罷揮麈詞韻亦清麗秀句天葩吐豁然醒心胸頓覺頭風愈啜茗少移時聊欲具雞黍起立前致辭母命曷敢侮弗得頃刻留軒軒若霞舉子實孝友徒沖幼識眉宇卓然有髙志餘子焉足數寒窗十年燈羣籍飽撑拄研覃盡精微窮討嗜清苦縱使拾青紫端若左右取匯為閭里榮遂不忝厥祖不聞先聖言得之在朴魯又不見桓生陳綬歎稽古子能踵前迹大器成簋簠假有勍敵師亦當偃旗鼓冀其不中輟榮身豈無補送子出門去矯首望江浦白紙扇歌聞次安惠紙筆因賦此以贈之我昔舟泊西江湄椎氷看搗萬楮皮江神相顧色慘愴波工自詫手不龜懷金問價雲滿篋霜紈失素無晶輝草年歸來存百一製成團扇真絶竒洪爐百煉太古雪紫篔三尺盤屈鐵銀潢清影秋鑑光玉虹冷貫青天月昏日摩娑驚老醜動搖清風生腋肘髙堂晝把蠅蚋空魑魅潛藏飛電走豈不聞蕺姥不識王右軍茂𢎞曽障元規塵謝公髙風固足尚班女篋笥空悲呻烏飛兔走急於箭商飈奄忽號枯林嗚呼盛衰天地無古今炎涼不易君子心素室針為聞次安賦唯君子之學思不出位安於定分芟其浮慕時止時行無怨無惡知人休之是曰行素詩書禮樂者善之基軒冕圭組者利之郛孝悌忠信者福之媒權利術數者禍之區居易俟命者為君子行險徼幸者為匹夫寧皎皎以遁世勿汶汶以畏途日新又新聖賢同歸耆叟司規敢言操觚有懷來鶴亭憶昔題詩坐鶴亭修篁欲染客衣青飛花造次沾歌扇舞鶴留連繞石屏正擬劉伶為酒頌莫教陸羽著茶經故人多在青雲上獨怪江湖老客星和子英袁先生韻及謝所寄先人志文交遊長是嘆暌離白首重逢似有期老去知非憐伯玉向來好事愧當時林隂鶴語風生竹花暗笙聲月上池珍重遺文勞逺寄知公念我未云衰其二頻年役役苦屯邅竹杖芒鞋到處禪南海諸山雲外看西江百尺月中牽豪華銷歇隨流水潦倒無成休問天好及耆年同結社玉山佳處細談玄題松亭琴士便面隱者茅亭並水安單羅鶴氅怯輕寒松聲萬壑秋如海月下瑶琴不用彈讀宋太史詩文集漫書金華山下古潛溪秀發英靈間世竒歲久不聞清廟瑟眼明今見玉堂詩百年人物推此老一代風流當繼誰頗恨淹留忘墜景遺編徒使後來悲菊田余客竹洲三年頗有彭澤東籬之好古人亦謂菊獨以秋花傲兀於搖落之後非霜下之傑乎昔年曽賦對菊之歌老興未已復作菊田一首以紀歲月耳時洪武已已秋重九後時書搖落西風已愴然金蕤月朵為誰妍人間無地安花宅洲上於今有菊田晚歲擬尋甘谷老頽齡幸值傅延年落英餐盡秋香骨許我飛行作地仙已已歲冬十一月築土於三山從王事也丁夫三十餘萬人十二月苦寒工雖畢而未遣家人在役寧無懷思焉遂賦一首去年椎氷上淮水今年荷鍤三山尾風凌肌骨利於錐雪過牛羊縮如蝟短日經簷慘無色宿麥蓋丘青下死天書早晚下三山坐使黔黎守環堵題秋林遊子圖十里山光入杳冥獨騎驢子澗邊行借問前頭向何處華陽觀裏聽松聲洪武庚午年正月間遊茜之廣孝寺冥搜又起劫前灰紺閣丹樓一日開龍伯鬘幢平地湧象王花雨自天來日髙金壁浮空出水落銀河到海回欲結莫年香火社扶笻獨上妙高臺訪成真觀有感四十年前余訪秋雲楊外史于成真維時殿樓竹樹森竦邃密其琳宫桂館不是過也後十年外史化去世道變遷天運才一周鞠為茂草荒墟然盛衰之變有不可得而語者如此今年春因訪舊復遊於此而有賦是歲庚午正月二十八日也暮年重訪成真觀不見秋雲竹外樓枸杞經春皆化犬朱藤歷歲總如虬種桃道士馮虛去採藥騷人汗漫遊見説蓬萊又清淺擬將黃鶴問丹丘題趙子昻畫馬圖卷靈物降精生倔竒貢來自是千里駒天間瀟瀟風滿旗立仗不受黃金羈吳興寫生世所稀春雷挾之上天飛仲春雨後生寒有懷蒼筤室東岡二月草芊綿淰淰輕寒雨後天楊桞三眠風作惡櫻桃半開春可憐詩域日荒拋硯石醉鄉時與打觥船清遊每憶蒼筤舍何日重來看碧鮮來鶴亭集卷六
