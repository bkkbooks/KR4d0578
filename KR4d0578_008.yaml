body:
  text: 來鶴亭集卷八明吕誠撰題寒江歸棹圖水色山光擁畫橋梵王宫殿在山腰扁舟好趂樵風去莫待寒江落晚潮題春江獨釣圖渭川老去興無餘猶愛江山錦不如渺渺煙波舟似葉一竿釣得幾多魚題秋浦行舟圖江色溟溟接太虛秋來到處有蓴鱸酒家鱠具如堪借暫卸南風十幅蒲題水墨龍圖畫史憑陵造化機研池傾倒墨龍飛生綃半幅春雲濕疑是山前行雨歸洪武癸酉五月十二日雨晴散走至則明翠濤軒過午回途漫成一首以寄既白軒中十日雨晚起扶桑發曙光搘笻緩躡野人屐看竹竟登君子堂少年豪飲不復作老去讀書渾健忘清談餉午聊自適歸去頗愁江路長五月二十八日重過翠濤軒清坐終日薄暮而歸賦此蓋書所見也翠濤為竹而得是名余不能無辭也矣幽人愛竹不喫笋養得修篁箇箇長五月六月雨不落千枝萬枝風自涼蒼雪逼人時展簟翠濤驚夢午移牀涓涓清潤烏皮几楚楚髙攙薜荔墻密影掃階敷瑣碎餘音拂水度笙簧孫枝迸地渾疑古老節凌雲色更蒼三徑旋開真得計七賢避世故佯狂因懷梅友稱三絶却笑荷花似六郎白鶴歸時雲動蕩青鸞嘯處夜微茫對之可使食無肉衰矣虛慚鬢有霜隱几無心開卷帙捲簾隨意炷爐香日中見斗瞻霄漢月下吹簫引鳯皇物外襟懷老可共間中滋味淡相忘不尋酒伴雞豚社誤落詩名錦繡坊時復開樽排匼匝每憐學子走趨蹡興來久坐無聊賴老去頻過也不妨他日成材唯汗簡於今觸目盡琳琅振衣散策歸來後江路迢迢又夕陽題松雪翁畫馬圖宛駒萬里貢丹霄穹鼻胡兒捫赤絛天廏自多千里駿人間難得九方皋則明遊餘杭三橋埠回過余草堂賦酬此秋日三橋埠行舟野色新亂山圍草市荒埭接江津杉竹通蠻獠麋麋販獵人欲將金粟酒為子拂征塵老態久知老必至豈謂便見侵一從今年來稍覺力不任凜凜畏寒暑悠悠念初心凌晨覽清鏡感嘆一何深目昏廢占畢頭童曷勝簮齒搖食物妨行步愁嶇崯乃知泡幻軀匪石亦匪金人生大化中急電掃光隂安有百年期推遷似難禁理勢必應是視古猶視今賢愚同一邱旁人謾霑襟丹桂吹古香萬户鳴秋砧且覆掌中杯彈我膝上琴於焉㵼孤憤三嘆有餘音秋晚寄懷則明餘杭未回雨過秋容淨天髙露氣寒官船鳴戍鼓螢火起漁灘好中明時選休歌蜀道難淹淹憂弱女聊為問平安題二喬圖喬家傾國綴周孫陳迹空餘粉墨存女子那容知許事但令修古議師昏題天育馬圖為海城鈕聲逺賦渥水神駒駿骨全奚官羈靮漫相纒情知不是塵中物春雷挾之飛上天題枯樹圖鐵幹槎牙翠葉殘雲根剝落古苔斑大材寧盡天年老不遇工師不出山九月晦聲逺留題十年不踏海城西杜曲桑麻志已違向來詩酒所遊歷為問人民今是非物態盡從風氣改霜威又作曉寒微出門浩浩塵如海笑對青山一振衣其二海門潮上水如煙賀老重維載酒船喜見雲山開雪璧幸因郎囝鼓氷絃應門僮子清於鶴搗藥靈禽半是仙嵗晚卜鄰應有約幾時行李到梅邊寄則明時客於竹洲作苜蓿花開遍地秋秋聲渾在樹梢頭西風昨夜吹歸夢喚起客懷無限愁其二幾樹芙蓉近水低碧沙涼露泣莎雞月邊已有南來雁飛過荻江官渡西九日則明會族人於翠濤軒席間賦詩見及因用韻答之九日翠濤當雅集宗人團坐氣回春承家幸有青氊舊顧我何妨白髮新即席揮毫誇草聖持杯採菊酹花神醉歸一道天風晚金粟吹香出兔輪晚歸書事六言訪舊五溪薄暮沙長歸路迢遙虛市人家燒燭流水孤村斷橋一個殘僧待渡數聲短􅐟歸樵閃閃昏鴉啼後江風又落寒潮其二漁榜溪翁罷釣郵鈴稚子傳書暝煙含雪欲落臘桞半黃未舒雲葉亂隨去雁浪花輕逐跳魚一假詩情畫意瀟然風景愁豫則明疾瘳喜而賦此以寄兼旬伏枕廢論文走卜迎醫豈憚頻疾去已如顛趾鼎慎身當似括囊坤挑燈鴈唳隂風厲煮藥雞鳴宿火溫寒雪嚴霜皆歷遍東風早晚入重門宿西菴值雨晚隄信步一搘笻西望青山落照中禪榻茗甌春乳白佛龕蓮熖夜燈紅人間漫説薰天富眼底都成撲地空新雨打窗詩夢破蟄雷又過海門東寒食日哭坦翁蒿里竟何在死生從此分擬將寒食淚欲灑暮江雲草暗鴒原水松枯馬鬛墳平生多述作地下更修文太倉周均德晉其先人與余家往還時德晉尚少庚辰已已以來值風塵澒洞各天一方聲迹不相聞者五十餘年洪武癸酉秋因訪鈕洞雲見德晉所作山圖恍如夢中一見吾故人也遂賦此以伸意併求其寫草堂圖云憶昔居海城汝翁我之友子時頤未鬚我始十八九别來五十年相顧各皓首往事不可追存者復何有前月到城中逺訪洞雲叟殷勤下徐榻覼縷具尊酒談及子髙致亹亹不絶口慷慨有所思我友殁已久惟今顔貌蒼秋風颭蒲桞案上見山圖尺楮藏培塿羡子材藝優豈復居人後嗟我已踰七見者驚老醜我家婁水西草屋大如斗流泉走松根古木立雲藪林密鶴屢巢江近鼉夜吼鈎簾豁冥昧萬象入窗牖幽哉抱拙素兀兀但株守洞雲繪成圖早晚落吾手倩子復寫之張壁慰衰朽作詩投故人諒識此情否醉歸醉歸不覺已斜曛稚子歡迎先候門霜林睡覺涼如水樹影滿窗疑是雲壽彛秉齋喬木東南掃地空靜安留得舊家風清名在昔稱髙士壽骨於今只兩翁臘蟻壺觴秋露白金魚池館雁來紅桑榆萬一皆強健看取年年此會同題黃鶴山樵畫匡山讀書圖黃鶴山人美如玉長年愛山看不足醉拈秃筆掃秋光割截匡山雲一幅詩豪每憶青蓮仙結巢讀書長醉眠我欲因之攬秀色雙鳬飛墮香爐前題黃筌畫竹鶴圖并序右黃筌畫竹鶴圖一卷已入能品豫鶴亭舊有此圖心甚惜之散落他室今數十年矣忽於鄉友處復見之喜嘆無已然尤物自無脛翼而能傲兀人世不與歲月同化亦一竒哉因賦此重為攬古者一慨云蜀人黃筌寫竹鶴數百年間一竒作玄裳縞衣意間暇老去崢嶸動林壑挺挺玉立雙琅玕枝葉扶疏鐵鉤絡憶昔鶴亭有此本鳥散煙銷久𡨕寞今朝忽見喜絶倒老目摩挲殊不惡千年令威安在哉舊物都非况城郭世間此圖亦希有重襲尤宜置縑槖髙堂懸向明月中應有仙音下寥廓寒食漫興書所見三首楊桞東風日夜顛杏桃無語不成妍水深竟沒鷗邊石雨重渾迷卵色天節序匆匆無可那物情洶洶最堪憐荒村間寂無雞犬何處人來掃墓田其二韶光去我太匆忙驅使間情入醉鄉燕燕鶯鶯三月暮風風雨雨一春忙加餐未厭青精飯爛煮那無白石羊老境於斯何足賴祗教世味淡相忘其三三月三日雨初晴清旦梳頭坐草亭一陂草色為誰緑千樹桞條無賴青憂患未平心耿耿衰遲那遣鬢星星林鳩底事頻呼婦強聒春愁苦厭聽聽雨傾倒天瓢走雨工海門龍過起腥風瀟瀟午夜鳴山竹如在春江聽打篷來鶴亭集卷八
