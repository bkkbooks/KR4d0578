body:
  text: 來鶴亭集補遺明吕誠撰九日雨中雜興四首橘柚青青菊未黃滿城風雨近重陽天光倒影涵空濶雲陳將愁赴渺茫尚憶登臨吹席帽誰能隨俗繫萸囊詩人底事無全句似欲相期入醉鄉其二風掃隂霾霽色新白沙江路淨無塵佳辰宜著揮毫客暮齒唯存見在身自笑千金誇敝帚不妨一飯煮勞薪人間萬事皆成幻付與雲安麯米春其三秋水蘋花繞釣磯關河千里雁初飛二毛脫落愁吹帽九月凄凉未授衣玉醴光浮杯斚滑繡糕香膩蟹螯肥物情叵奈多拘束欲假盧敖手一揮其四霜降海門天氣肅無邊落木總繽紛鷗眠野渡芙蓉雨雁落秋田䆉稏雲未有詩篇酬令節祗將茗碗對爐薰月中桂子飄人世時有天香隔幔聞甲戌歲中秋無月今夕何夕嘆獨醒䦨風伏雨幾時晴為渠滿魄當圓景奈此浮雲㸃太清蛟室朱扉應不啓兔宫玉杵寂無聲何當致我緱山頂醉卧瑶臺聽鳯笙九月二十三日赴宴定齊晚㑹歸有感風霜眯目走踆踆愧我閒居寂寞濵今古誰為了事漢關山空憶未歸人白頭且盡杯中物紅樹猶疑劫外春轉眼塵勞成底事浮雲變態幾回新送老僧頥翁歸住山中兼簡伯瑩和尚老禪歸南山相與散吟策維時秋冬交霜雨木葉赤野曠天宇寬足軟步履窄擬訪織履翁悵望一水隔目致繾綣辭聊以塞吾責新冬乍寒書懷一榻清寒戀舊氊飽餐世味意茫然疏林寒日駸駸短殘菊經霜故故妍五鼎從來非我志一貧正不要人憐此生本是悠悠者眼底光隂只信緣三月十二日初度辱外族諸親過草堂兼有祝頌之詞賦此以謝杏花風暖破春隂既白軒中喜盍簮世事荒荒相聚少霞杯灔灔莫辭深豫生初度當三月天與清閒抵萬金多謝諸賢為我壽殷勤重感嵗寒心期友不至長日閒吟步紫苔流光轉眼熟黃梅雄風豪雨將春去濁潦深泥少客來老柘葉稀愁繭瘦草田水滿厭鳩催題詩問訊王文學懷抱何時一笑開挽友殁于旅途故人藁葬斷磯頭恨滿西風白露洲化鶴不隨丁令返騎鯨應伴謫仙遊志詞誰為鐫崖石旅夢懸知到首丘草載交游成永訣青山愁對大江流秋雨中辱翠濤軒則明頒及佳貺次韻用答風雨瀟瀟夜晦迷親朋南北嘆暌離世間物態雲千變眼底功名黍一炊酒債不妨緣客慣詩名端復畏人知時時甘脆遙相寄况有新篇慰我思其二深秋凉思眇無涯餘熾蒸人惱阿家海氣昏昏雲似墨江流泯泯雨如麻舊塍䆉稏行當刈新壤榛蕪次第畬世路只今誠局縮挾仙直欲駕虹查雨中雜言詩八首寄仲莊則明二妙數篇遙寄水東隈想為吟哦助笑咍池草已衰無好句阿連空向夢中來其二慣識西莊第五橋短藜時復過林皋槿籬竹屋江村路愛聽清風響翠濤其三獨穿斜徑草芃芃攘臂褰衣微醉中運餉船歸鴻雁月採菱歌斷鯉魚風其四世諦紛紜歲月長感時懷古未渠央癡兒若了公家事始信燕山有義方其五鬱陶未解出村稀雨後涼生日色微便覺今宵風露重此身從此怯單衣其六野老山妻笑語同腰鎌先穫泰州紅嘗新舂玉知非晚喜聽笳聲夕照中其七屈指無多九日陰可能無地一登臨懷人風雨成癡坐抱膝茶烟長短吟其八今秋八月甲子雨刈穫望晴猶未能夜祠田祖村村鼓水落鱸魚港港罾寄北山講師基古石尊宿杖履長懷訪北山老僧忘世此中閒不辭蕙帳來猿鶴要使山林識珮環海氣含霜浮沆瀣溪聲和月㵼潺湲老來擬入耆英社分我翠微雲半間題梅雪鶴亭二圖凍雲深護白龍堆剪水仙人海上來夜半鶴歸春信到儘將生意付江梅其二南屏左股翠糢糊寫入儂家罨畫圖覽勝不妨留巨眼草堂堆案有西湖洪武乙亥春寒漫興交歲晴光少凝寒雨霰重水添垂釣石樹鼓落燈風晚斚浮蛆粕春盤問笋菘鶯花渾寂寞遊興莫匆匆寄謝伯瑩長老惠林松語録繼述頻年備討論擬將遺教輔宗門藂林枝幹寧無本文海波瀾更有源叔季奚知師道貴舂容重喜典刑存是編不獨追金玉㑹使西江一口吞風雨連日閉户默坐懷思可知忽翠濤軒以笋蔬之惠走筆答之春事多隨逝水東不堪日夜雨兼風龍歸海浦沈雲黑鳥啄櫻桃落子紅老境詎言詩有債醉鄉誰謂酒無功鮭蔬向賴西鄰笋瓷缶時將五尺僮漫興秋暘烈烈晚風微病葉號蟬色慘悽感舊每因尋友夢訴懷那有上天梯哲人逝矣憂民困嫠婦澘然賣女啼無限新愁禁不得海雲深處雁行低挽鄉人夢破邯鄲指一彈旅魂歸繞玉山寒無人早悟生如寄有子能賢死亦安壯歲聲名何俊爽老懷悲惋獨辛酸一壞黃土西風裏數尺青松掩袂看十一月十五日因過翠濤室薄暮風寒遂宿賦此以紀兼簡琇南石坐久不妨聞茗碗深談未用照青藜寒驚殘夢瀟瀟竹暖覆重衾戀戀綈自笑此身空濩落已勝羈宦走東西似聞勝集東林下細雨無緣過虎溪臘八日則明以詩寄余言及崇恩至翠濤室不得一見為歉遂次韻寄靈源老師兼簡隻江開士交際長懷佛日山南北相望水雲間清修久已欽三學妙義終當示八還野渡舟橫潮漫漫河洲風定鳥關關靈師倘過雲房榻擬對茶甌半日間淵明醉歸圖誰具壺觴大道邊老人傾倒即頺然阿宣扶上烏犍背隱似清風太乙蓮來鶴亭集補遺
