body:
  text: 來鶴亭集卷三元吕誠撰和顧玉山詩韵春來世事益艱危怪底閒情強賦詩楊桞愁空陶令宅荷花吟遍白家池眼前陵谷驚遷變客裏江山喜護持兩度寄書煩慰藉相從深愧負幽期題廬山道士雲松詩卷道人結屋雲松間白雲為室松為關夜深騎鶴上天去雲在虛空松在山題美人圖繡牀風暖鬱金裙曉起蛾眉八字分翠管成龍吹怨曲雲梭銜鳯織回文荼􅐘醥熟春江雪豆蔻花開曉樹雲照檻扶桑紅日透自援綵筆賦東君題買臣負薪圖㑹稽太守貧賤時負薪行歌妻哂之百年未滿决絶去斷絃破鏡離鸞飛五馬金鞍照流水富貴歸來動鄉里莫怨故人無古心却視新夫羞欲死落花離離辭故枝浮雲去去無回期結交義薄有如此柏舟三復共姜詩題極目亭海虞亭子層闌上髙興清秋爽氣俱歷歷吳山明落照茫茫淮甸入荒蕪興亡千古看棋局晴雨四時開畫圖日日憑欄瞻北固仙人借得一雙鳬歸田雜言四首鳩啼屋東桑水車鳴野田煩暑正鬱隆氣燎如燔煎老農事耘耨爬沙手胝胼禾黍既芃芃露葉相新鮮幸雨公家苖遂我粥與饘藜藿充饑腸籧篨覆余屋食指稍林林生計冀豐熟江山悅性情詩書貯便腹白玉不可為庸庸滋後福其二鑿墉啓北窗清飈飄然來泠泠溉煩襟濯濯淨纎埃桃笙展琉璃菡蓞溢霞醅白羽致不揮羲皇安在哉其三茫茫天壤間出門竟何之白日運寸晷流光倐如馳即鹿敗無虞亡羊以多岐浮生雖殊途至老乃同歸其四祥麟狩而出僅與野羊般所不如孤豚在檻猶在山飛龍何神竒薄遊霄漢間噓吸出雲氣施澤何曽慳既白水軒水軒如笠大聊作一枝棲晚飯長腰米朝盤短股虀江湖雙短鬢日月兩醯雞徙倚郊原望王孫草又迷南歸午日午日葵榴屋角新過園又復值佳辰柔絲聊結誇兒女細葛懸知賜近臣菰黍無人沈楚澤荔枝此日薦南閩弟兄淪落知誰在自捧蒲觴壽老親首夏田家雨中細雨朝來濕白沙風前整整復斜斜林蕉閒展琉璃葉野蔓疏開金銀花田父扶犁驅一犢稚女踏車垂兩丫年年梅熟愁蒸暑却愛小池鳴亂蛙洪武庚申夏四月登玉山頂時雅上人適遷華藏於塔院歷覽終日而返是夕宿友人家燈前聞雨援筆有賦曉出城西門蕩漾官河艇朝光散晴旭露氣擁高迥潮上洲渚沒棹發六飛騁前岑獻竒狀心目快引領青山如故人登陟在俄頃嗟哉二三子憐我作力逞捨舟入蒼翠一徑林木靜隂蘚護危棧古藤絡眢井映帶列檜杉青黃熟梅杏古師禪定處神物伏精猛山靈詭異工幻跡一掃屏孤塔歷劫餘傲兀立峯頂後巖古華藏稍復毗盧境泛觀盛衰際何物得修永道人出迎客一笑具羞茗清談竟終日毛骨灑然冷羣鳥亦知還微陽下西嶺遄歸弗成寐張燈酌楠癭急雨何方來清聲雜蛙黽鄙言詎成章聊假管城穎初夏南塘候氣分清淑江深暑尚微樹髙烏晚哺野曠雉朝飛掘筍髠雙角烹茶試一旗靜中觀物理消息豈相違晚霽暑雨晚來霽凉颸動竹杉夕陽明古岸新月露塵函孤塔高如枿歸雲迅若帆脫巾梳短髮局束愧朝衫中秋對月貝闕珠宫浩蕩開霓裳驂乘羽衣陪素華臺上吹笙過天柱峯頭跨鶴來養魄桂花雲錯莫著明蓬鬢雪髬䰄仙人乞我金莖露歸向人間作酒杯田居書懷僻居婁西村歲月嗟屢過桑麻八口家僅爾免饑餓公田倩牛耕癡兒固慵惰雖乏甘脆供所賴出舂磨前榮䕃髙榆後陂竹千個薰風颯然來自足償髙卧念無謝傅才甘受婁公唾觀刈晚歸堪笑南塘野老家客來無酒只烹茶池荒蓮蛹青房子霜老雞人絳幘花海氣東連瑶浦暗江流西繞玉山斜杖藜緩步歸來晚閒看汙邪載滿車對雪急雪飄揚海上村崩騰排捘故繽紛青山竟沒羣羊石玉宇低回萬鶴雲獻歲稔豐寧有兆拯時哀痛似無聞奈寒唯咤梅清苦伴我清吟到夜分戲咏近體雪二十韵天葩初雜霰倐爾遍塵寰島嶼沉蒼翠峰巒失黛鬟冥冥連朔漠混混暗荆蠻低揚才穿竹斜飛已沒菅田疇俄變海壟岸忽成山著鬢愁絲濕霑衣愛纈斑駭雞時散亂像虎不堅頑巧向歌樓密輕隨舞袖還覆深欺麥短勢重壓梅孱幽險皆平坦廡隅喪曲彎填凹擕尺驗封澗失泉潺落落遺圭璧疏疏委珮環蒼黃憐犬吠堆積伴鷗閒屐印瓊瑶跡林排玉笋班有人懷剡曲無馬度藍關融液三江漲飄殘六出慳懸簮宜導髮作餌弗賙艱膠酒行諸令聨詩賭百鍰色聲真是道貞素不藏奸皎潔侵黃裏光明耀白間綾衾春帳暖束藁念孤鰥寄紹隆上人憶别草堂天雨雪又驚木葉打江波築居僅隔牛鳴地入室終憐象渡河老去道緣應恨淺從來佛法苦無多側聞近畨歸林下信便寥寥奈爾何戊午七月四日立秋大水異常謾書以記之洋雲翻墨蔽金鴉驚定愁聞雨腳斜潮勢驅山平作地秋聲連海浩無涯馮夷伐鼓飛龍虎颶母追鋒駕鬼車濈濈牛羊浮浪去不勝生聚化蟲沙聞雨江城戍鼓曉如雷跋涉頻年志已灰身外浮雲唯一榻卧聽風雨海東來月下懷友秋庭夜泬寥雲影絶纎毫月轉清宵迥星臨紫極髙蟻醅金錯落鳯吹鬱輪袍不舉山隂棹空孤一世豪寄婁下則明昆季憶爾南莊大小山别來秋月幾回彎匣龍夜夜鳴孤劍管豹時時見一斑凉露芙蕖開璧沼五臾星斗轉銀灣好詩婁下知多少半在君家伯仲間寒食郊行草軟沙平步履輕百錢日日繫烏藤市橋風斾梨花酒游女春衫柿葉綾烏帽飄蕭明素髮石麟欹側卧荒陵百年俯仰須臾事遊覽匆匆愧未能三江詞戲贈三江口頭日欲晡三江女兒自當壚今朝江南送郎去望斷東風檣上烏其二檣頭五兩逐風輕聽得吳歌慘别情一片劉家河上月照郎直到定遼城採鮮曲春水魚來聽賣鮮金鰭銀鬛映江天道人久矣忘滋味誰說饞夫滿口涎其二北海南洋開利孔欹檣側柁苦誅求朐山壽帶白于玊漢江渾不貴槎頭其三鰂魚引子沈雲黑石首呌羣隂火紅密網疏罾知幾許海門日日起腥風其四昔年嶺海味南烹種種殊形不記名獨數沙灣馬甲柱豪門無此一杯羮絶句題山水圖大匠求直幹汲人竭甘泉所以支離翁幸爾終天年其二秃髮念冠欹搖齒怯水寒只合東江上開軒把釣竿一百五日歌緑楊風急連江雨寒食今朝一百五盡將麥飯灑荒丘漫把春酤酹黃土人生在世無百年流光過眼如流泉生老病死㑹不免鬼伯那受人間錢憶昔東家萬金産甲第青紅照人眼雲翻雨覆須臾期空鑄千年鐵門限門前賔客安在哉梨花杏花參差開海內交游半為鬼有酒不飲心孔哀豈不聞冶城城南古官道道上青山如聚寶清明十見紙錢飛白骨無言卧青草午日漫興年華流水苦匆匆佳節樽前幾度逢稚子束芻蓬作虎將軍射桞馬如龍衰年詩句多多變此日光隂五五重小閣荷香吹醉醒玉蟾髙挂海西峯蟬舊說蟬未脫時名腹育乃土中朽木所化也首夏聞之感而有賦朽株出土即超然登木猶如脫骨仙秋露枝頭枵腹滿夕陽江上怨聲聨于今東海無齊女自昔山川有杜鵑蚓噪若為能比數潔身美䕃豈非賢寄竹房道人伯瑩一春頗訝簡書稀皓首空知五十非詩業未能忘綺語箭鋒不覺墮初機鴨頭水緑濃于酒鶴背雲深冷入衣齊鉢似聞親遣化慈航應載衆香歸寒夜擁被不成寢挑燈盡夜分雁鴻衝雪過戍鼓隔雲聞俚俗皆從賈閭閻不尚文酪奴清意味為我解餘醺漫興柴門不出長蒼苔今雨渾無好客來忘却雞豚三月味煮葵燒笋亦悠哉其二寂寂髙門大道邊東風愁鎖緑楊烟大兒已入滇池戍嫠婦空耕壟上田其三赭服戎戎萬里行風餐水宿事宵征金沙江繞烏蠻寨越巂山連孟獲城其四雨餘江色碧浮空一髮青山落照中去棹休歌桃葉渡行人愁殺桞花風十六夜對月月夕浮雲變蒼狗無術因之徹其蔀海風今夜東南來盡捲飛埃絶纎垢碧天萬里開氷壺清光落我持杯手宿羽聨翩翻露巢寒迷離搗霜臼嘉賔况爾平生歡如此良宵寧可負鄰家麴生好風味三百青錢呼一斗桂漿正熟菊未莎蓴羮爛煮橙可缺倒射白獸光緑波蕩搖金虬走老農斷葷不止酒喜賔和月吞入口興酣且致亹亹談歌成自答嗚嗚缶百年此樂能幾何瓢空更起謀諸婦身閒無事古所貴有客無酒時則否但願月光長入杯歲歲年年為君壽明朝更上文筆峯探支西風作重九洪武丁邜九月八日書屋小如書畫船繞屋種菊如花田祁祁大朵鶴翎瘦灼灼卑枝鶯羽鮮義熙處士愛三徑杜陵野老無一錢却笑重陽明日是白衣送酒過年年對菊歌洪武戊辰歲居竹州書舍種菊數十本秋花爛然終日吟嘯其側因賦對菊之歌而貰酒花下酌以歌之亦老人暮年之一快也嗟哉秋菊有竒操義熙老人所鍾好亭亭玉立秋風前肯與春芳作同調顧豫不惜灌溉勞亦欲因之展清眺西風九日吹東籬亂㸃秋光入詩料過簷不羡一丈髙清容自得真如妙大朵如擎小若仰傍若參陪前者導黃黃白白間紅紫整整僛僛絶嚬笑蟾光冷淡卧胎仙翠影葳蕤宿黃鷂天工久已費雕刻老人幸得供吟嘯有時傾倒醉籬邊有時忘餐哦夕照幾度呻吟被花惱防折時時嗔惡少江州不見遣白衣參軍何處吹烏帽樵人敢向擔頭誇城中僅亦能稍稍可能造次負芳期遂使寒香委霖淖歲晚孤根許相托急景如流勿嗟悼歌成自作商音謳天籟瀟瀟鳴萬竅色香勿向毗耶道恐謂吾儂作顛倒來鶴亭集卷三
