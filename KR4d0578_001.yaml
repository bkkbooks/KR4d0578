body:
  text: 來鶴亭集卷一元吕誠撰遊石湖次五峯李著作韻三月石湖湖水涯繞城山色過楞伽隊隊行春柘枝鼓隂隂新雨石楠花和張伯雨鶴亭夜坐韻草閣清宵中淰淰蒼筤四壁影疏疏天頭雲過多於鴈池裏星移或似魚懷遷善齋寄希先生絶愛徴君齋閣好哦詩竟日未能來橋頭梔子侵江色坊裏桐花覆雨開立春日試筆正月一日立春日已喜氷霜昨夜除閶闔卿雲扶帝座東南佳氣滿坤輿玉盤綵縷誰能共雪樹梅花政待舒坐憶故人春雨裏草堂尊酒幸相於送道士鄭蒙泉北上一道榮光指北辰七星文劍爛如銀上皇頻賜雙莖露阿母時迎九色麟靈籟滿旗飄婀娜卿雲團蓋護輪困天門夜奏金龍簡願祝無為壽聖人寄謝張貞居所惠詩文外史高居靈石塢湖山寂寂重餘榮平生道園虞太史故人聖井薛玄卿手捉麈尾玉同色眼看鷗波秋與明五十篇詩句句好小箋龍鳯字縱橫池亭雅集得回字池閣清泠曉四開風泉滿院殷輕雷謝家草色侵衣上司馬琴聲到幕回瓊樹亞枝飛鶴子紅粱蘸甲膩蠡杯諸郎醉墨淋漓甚未絶風流宋玉才戲賦禁體雪剪水仙人駕玉虹散花來自蘂珠宫八埏總入洪濛內萬象同歸太素中鷴影翩翩微映月蝶羣陳陳巧隨風謝家此日誇清辨鹽絮由來未擬工暮春來鶴亭謾興緑樹軒窗燕子過清隂密覆小陂陀笙調鳯咮新簧澀礎潤龜趺宿雨多落絮遊絲空散漫野情幽思欲如何日長倦倚烏皮几間染霜毫試衍波次韻答郯九成蘇城冬夜哦詩起坐城頭屋梅氣生寒近榻前鐘鼓時聞髙閣報鴈鴻或與斷雲連好懷憶得幽人共清事多為百慮牽我有草堂池水上思歸明日買吳船寄周子固先生汝南先生豫所欽暮年築室大江潯妙傳邵子先天學獨得濓溪太極心金鼎芙蓉長候火雪巢風月自鳴琴期君乞與青囊術草閣梅花重一臨登蘇臺懷古一月長洲花亂開酒酣攜客一登臺繞城山色臨吳會滿地溪聲走越來北闕天高星使下西陵日落釣船回獨憐泰伯荒祠在煙雨金鋪長緑苔賦帶露櫻桃萬緑藂中綴木難折來靈液尚漙漙玉纎香剝雞頭軟仙掌寒分鶴頂丹天酒淋漓樊子醉月盤璀璨漢臣看不妨更漬薔薇水潤我談玄舌本乾秋晚雞號天未明柝靜四鄰寂疏星如聨珠殘月懸殿壁風清鶴在林露重水成滴危坐絶百非嗒然喪形質大明啓東方雲霞半空赤巢雲為道士賦道士煉白雲構之玉山腹可泊兼可栖非槎復非屋盤礴太素中萬象入毫粟朝驂一青鸞暮返兩黃鵠駕言往從之期君大丹熟李五峯伯雨廉夫希仲夜集來鶴亭上璆璆環珮玉鏘鳴夜燕蓬萊衛叔卿叨餮雷文商爵古騶虞雪操舜琴清藏䦰座暖春屏錦舞劍星流璧月城客散瓊臺風露冷夢中時見許飛瓊上柏臺鐵冠十載柏臺仙居官無事清且賢鳯凰九苞出丹穴麒麟五色下青天霜飛白簡楓宸邇雲擁露車風雨邊尺一明朝喚歸去聲名已作路碑傳栖雲為玉山某僧賦山僧愛山復愛雲繞座雲山天所借山雲與僧有宿契故向雲間築僧舍飛來玉山都是雲枕席屏帷雲作藉朝與雲耕暮共栖雲來雲去任東西亦知此身無住著強把栖雲壁上題我意山僧忙戲劇有女如花招不得平生故説色是空一榻白雲空是色是空是色總無憑且與浮雲過此生却笑林端雙白鶴結巢飬子老營營七月十五夜看月得明字秋來見月人皆喜我獨感時非世情河北瀰漫無故道吳東凋喪不聊生欃槍夜發光如日鼓角秋高聲滿城門外大潮天地白好歌桂楫擊空明南海道中海樹排雲出江潮過雨渾船通柑子港山繞木綿村其二深深烏石渡渺渺白鷗波憶得荷花裡江南夜雨多其三一雨晚來霽冥冥野色分江明銜塞日風颭落洋雲其四果熟楊梅雨林蒸茉莉風飛雲天上白旭日海邊紅大庾嶺留題晨興散策雲封寺巗岫天開紫翠圖一水南來分百粵大江東下入三吳其二霜旭開晴曉出關衝寒驢子蝟攢攢西風百里南雄道緑樹丹楓滿意看南行舟中南食有底不可意北客相逢若介肥何事大官供蠻耳塘厨將炙乏朱衣其二山中無江多是溪英川側近有猿啼修竹寧同曲水會桃花還似武陵迷其三春開冬開岩下花朝虛暮虛溪裏家白帽漁郎山色瘦青裙樵女髻鬟丫其四轉參移斗送年華碧落青松夢裏家近似盧敖遊汗漫逺如賈誼謫長沙其五荔枝花發暗蠻村孔雀驚寒減翠文也有北人開眼處碧山無數插紅雲其六小舫無行車馬喧短撓輕槳破紅煙無由逺逐軒皇駕素瑟重聽五十絃胥山晚泊海風吹雨灑船窗石子沙灘占半江黃帽唱歌牽百丈避人鷗鳥去雙雙過十八灘灘有銅槃狗脊等名唯天柱惶恐最險者十八灘頭秋水高扁舟掀舞一鴻毛瀧聲東峽雙崖怒石腳牽江百丈牢得食鸕鷀窺淺瀨收魚燈火守寒皋要知惶恐連天柱未許舟師率爾操湞陽峽山飛來寺峽山山上飛來寺紺閣層層樹裏開僧璧已隨猿女化梵鐘曾逐蜃樓回萬松夾道時聞雨衆壑奔流夜殷雷猶有昔賢珠玉在斷碑剝落弄莓苔猿女乃孫恪妻後至寺還璧化猿而去也番禺漫興炎方弔古易興哀知是昆明幾劫灰黃木灣圍南海廟白雲山擁粵王臺百年此地衣冠盡五月南風舶艑來遊覽尚餘高興在匆匆莫遣二毛催其二莫言南海是天涯逺客何妨歲月賖豈謂居夷忘故土直須浮海泛靈槎藥洲石卧仙羊去蕃塔風高鐵鳯斜白首飄零誰慰藉幾回松菊夢還家南海口號六首象郡大蕃當百粵羊城方面鎮南州環山雉堞雲霞曉落日旌旗海嶽秋其二荒服未嘗沾政化島夷今始識衣冠船來爭市龍魚鮓客至先需荔子盤其三誰家女兒高髻妝行春踏花屐齒香留客不將茶當酒銅盤蔞葉進檳榔其四春看客裏逢元夕大市小市燒燈紅女郎手鼓如杯大半夜答歌明月中其五炎方物色異東吳桂蠧椰漿代酪奴十月暖寒開小閣張燈團坐打邊爐其六儋耳夷人不著衣纈花藜布滿身圍輕舟似葉爭飄海載得檳榔換米歸越樓觀燈午夜氷輪爛不收又看春色滿南州沉香火底鰲山柱翠幕星前羯鼓樓小隊天魔花作陳初筵雲醴玉為舟要知此景非人世何必羅公作幻遊粵王臺懷古神劍當時斬白蛇華夷悉入卯金家徒憐南海居蛙坎未識中原制犬牙獻璧稱藩真得計槖金滿載已堪嗟荆榛滿目荒臺下獨倚東風聽晚笳遊白雲諸山三首半空蒼翠薄層崖萬木森森礙日車八十老禪延客坐九龍山上試新茶其二後巖巖上看飛泉蒲澗曽聞降五仙黃竹斷碑前代燼禹糧堯韭昔人傳其三瑶草春深白鹿眠丹霞樓閣翠生煙偶來石上尋棊局猶恐歸時不計年訶林光孝寺方丈斜日荒涼噪乳鴉菩提新葉小如茶石廊久雨無人到落盡間庭訶子花琪林留題琅玕照烏几桂漿開玉缸道士喜客至呼鶴舞一雙玄鶴琪林兩玄鶴鳴舞欲高飛白雪侵丹頂緇塵染素衣金秋霜月滿玉宇晚風微此日修翎長芝田夜不歸落星渚大孤白沙明積雪鞋峯夕氣散如煙騎龍仙子去不返千古無人艤鐵船小孤山夜泊彭郎磯頭江水深小姑祠前風滿林秋天青青秋月白霜裏吹簫龍夜吟來鶴亭集卷一
