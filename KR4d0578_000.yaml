body:
  text: 來鶴亭詩别集類四元提要臣等謹案來鶴亭詩九卷補遺一卷元吕誠撰誠字敬夫崑山人工於吟咏詩格清麗與同里郭翼陸仁袁華相唱和嘗於園林蓄一鶴後有鶴自來為伍因築來鶴亭併以名其詩集考集中第一卷多嶺南詩二卷有洪武辛亥南歸重渡梅關詩云去年竄逐下南溟萬里歸來鬢已星辛亥為洪武四年是明初嘗謫遷廣東已而赦歸其緣何事獲譴則不可考第八卷詩內有洪武癸酉紀年癸酉為洪武二十六年而楊維楨前序作于至正七年丁亥至是已四十七年計其時誠亦耄矣諸書皆稱吕處士無言其嘗仕于明者則仍元遺老也集不知何人所編維楨序稱嘗和其古樂府自上京至江南謡弄若干首今集中皆無之則原序雖存詩已多所散佚非其原本又顧嗣立原本百家詩選稱其尚有既白軒竹洲歸田諸稿今所見者維此集或維楨所言在於他集之內歟乾隆十年月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀來鶴亭集原序蘇之邑凡六大率風浮俗淖大家尚氣勢交關貴人視文藝蔑如也獨崑山多才子魁出者往往稱吕袁袁曰子英吕曰敬夫也兩人為詩風流俊采皆一時之選豫固未能優劣之豫詩喜樂府古體子英雖多為豫和之敬夫又必爭鳴於右自上京以下至宫閨江南謡弄凡若干首敬夫作黃庭楷繕寫成要豫評且曰豫詩非先生弗能知弗能知能評者寡矣知而能評而引説於其首舍先生誰人哉曰嘻詩有情有聲有象有趣有法有體而禪巫之提唱武士之呌呼文墨生之議論不在有焉故豫每評詩不有其有而有其不當有者皆非詩也姑以商之又草野煙蘿邊塞臺閣之不無異也談詩者以地異律焉易地則不能也豫觀敬夫未必不為朝廷侍從才也敬夫在野而蔚然之言足以鐘鼎一時侍從焉於戲人之才也又何以地律哉雖然吾於敬夫不無感者矣代有蘭臺藝閣之居而其言覆野俾誦敬夫之言其不泚然在顙者敬夫可以豫説出之矣至正七年三月三日鐵􅐟老人會稽楊維禎序崑山為州並東南之海夷方之物坌集叢至卉服鳥言之人貿焉雜處其間雖比屋能坐致富贏然其民不幸不聞禮樂文物之懿亦日趨於愚而已彼秀民能讀書為士負文藝之竒往往見之於四方鴻儒老生交口相許豫雖旦暮出入㕓中其冠服修好而民莫知察也余嘗崑山取友得四人焉郭羲仲陸良貴袁子英三人之為詩或雄或雅或溫厚或流麗跌宕雖或不同要皆能去夫險阻僻陋之習其一人則敬夫敬夫成童時嘗從豫受學既長益氣夷色壯學端識敏自知奮厲且工為詩其詞多竒麗清婉出己意見不肯剽取古今人言是皆盛世治平之氣而使然耶不然何其聲一出於和且美也敬夫又能取友羲仲相與議論可否其資亦深矣乃裒其為詩若干卷楊君廉夫敘之其言固足以取信當世豫可略矣然豫以敬夫雖處而未仕而楊君亦因其材質之美而許之亦何所不可也使他日誦敬夫之詩而徴豫言或者知其不誣矣至正戊子春上已日昆陽鄭東敘此書先公壯年授徒時所抄自己丑至今藏之已五十有一年矣惜其集中於吾崑往事故迹著録頗少無以考見前輩嘉言善行之一二縣志載公為婁東巨族少力學淹貫經史於世利淡然無所好所居有園圃若山林之勝嘗蓄一鶴復有鶴自來為伍因築來鶴亭邑宰屢聘為訓不就卒老於鄉噫視今大家子弟欲求如公又可多得哉天順三年夏五月望崑山後學鄭文康記
